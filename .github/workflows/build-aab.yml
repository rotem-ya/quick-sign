# Builds a signed Android App Bundle (AAB) for Google Play, then packages it in
# a ZIP together with all the store-listing texts + assets and publishes the ZIP
# to the 'aab-submission' Release for a one-click download.
#
# Signing uses the UPLOAD_* secrets (see COWORK_UPLOAD.md). Trigger it by pushing
# a change to .github/aab-release.txt, or via "Run workflow".
name: Build AAB (Google Play)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name (e.g. 1.0.0)"
        default: "1.0.0"
  push:
    branches: [claude/app-store-submission-kr520m, main]
    paths: [".github/aab-release.txt"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - name: Restore upload keystore from secret
        run: echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - run: flutter pub get
      - name: Build signed App Bundle
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name="${{ github.event.inputs.build_name || '1.0.0' }}" \
            --build-number="${{ github.run_number }}"

      - name: Assemble submission package
        run: |
          mkdir -p pkg/store
          cp build/app/outputs/bundle/release/app-release.aab pkg/
          cp store/*.txt pkg/store/ 2>/dev/null || true
          cp STORE_SUBMISSION.md pkg/store/ 2>/dev/null || true
          cp web/privacy.html pkg/store/privacy.html 2>/dev/null || true
          cp assets/store/feature_graphic_1024x500.png pkg/store/ 2>/dev/null || true
          cp assets/store/play_icon_512.png pkg/store/ 2>/dev/null || true
          cp assets/store/screenshot_*.png pkg/store/ 2>/dev/null || true
          cd pkg && zip -r ../quicksign-submission.zip . && cd ..
          ls -la quicksign-submission.zip

      - uses: actions/upload-artifact@v4
        with:
          name: quicksign-submission
          path: quicksign-submission.zip

      - name: Publish submission ZIP to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aab-submission
          name: QuickSign — submission package (AAB + texts)
          body: |
            Google Play submission package for QuickSign.
            Commit: ${{ github.sha }}
            Contents: app-release.aab + store/ (listing texts, data-safety
            answers, privacy.html, feature graphic).
            See COWORK_UPLOAD.md for the upload steps.
          files: quicksign-submission.zip
