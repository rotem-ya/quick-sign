# Builds an installable release APK and publishes it to a GitHub Release with
# a stable download link, so a preview build can be handed to a tester without
# a local Flutter toolchain.
#
# Signing: uses the upload keystore when the 4 UPLOAD_* secrets are set (the
# same signing identity as the store build, so Google Sign-In keeps working
# on a device where that key's SHA-1 is registered in Firebase). Without the
# secrets it falls back to an ephemeral debug key — the app still installs and
# runs, but Google Sign-In will fail (its SHA-1 isn't registered), so cloud
# sync can't be tested. The release notes record which key was used.
name: Build APK (preview)

on:
  push:
    branches: [claude/app-store-submission-kr520m]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      - name: Restore upload keystore (only if the secret is set)
        env:
          KS: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "$KS" | base64 -d > android/app/keystore.jks
            echo "SIGNED_WITH=upload keystore (Google Sign-In works)" >> "$GITHUB_ENV"
          else
            echo "SIGNED_WITH=debug key (Google Sign-In will NOT work — set UPLOAD_* secrets)" >> "$GITHUB_ENV"
          fi

      - run: flutter pub get

      - name: Build release APK
        env:
          KEYSTORE_STORE_PASS: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEYSTORE_KEY_PASS: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-preview
          name: QuickSign — preview APK
          body: |
            Installable preview build of QuickSign.
            Commit: ${{ github.sha }}
            Signed with: ${{ env.SIGNED_WITH }}
          files: build/app/outputs/flutter-apk/app-release.apk
