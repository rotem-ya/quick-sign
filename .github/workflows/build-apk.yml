# Builds an installable release APK and publishes it to a GitHub Release with
# a stable download link, so a preview build can be handed to a tester without
# a local Flutter toolchain.
#
# Signing: uses the upload keystore when the 4 UPLOAD_* secrets are set (the
# same signing identity as the store build, so Google Sign-In keeps working
# on a device where that key's SHA-1 is registered in Firebase). Without the
# secrets it falls back to an ephemeral debug key — the app still installs and
# runs, but Google Sign-In will fail (its SHA-1 isn't registered), so cloud
# sync can't be tested. The release notes record which key was used.
name: Build APK (preview)

on:
  push:
    branches: [claude/app-store-submission-kr520m]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, cache: true }

      # Sign the preview APK deterministically with the committed preview
      # keystore, whose SHA-1 (26:87:22:9F:7B:AF:A5:83:6D:E7:E8:EF:FE:2D:FB:
      # 4F:A4:A0:4E:6E) is registered in Firebase for com.rotem.quicksign —
      # so Google Sign-In works. This is a PREVIEW-ONLY key, not the Play
      # store signing identity (Play App Signing manages that separately).
      - name: Use preview signing keystore
        run: |
          cp ci/quicksign-preview.keystore android/app/keystore.jks
          {
            echo "KEYSTORE_STORE_PASS=quicksignpreview"
            echo "KEYSTORE_ALIAS=quicksign"
            echo "KEYSTORE_KEY_PASS=quicksignpreview"
          } >> "$GITHUB_ENV"

      - run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-preview
          name: QuickSign — preview APK
          body: |
            Installable preview build of QuickSign.
            Commit: ${{ github.sha }}
            Signed with: preview keystore (SHA-1 26:87:…:4E:6E, registered in Firebase — Google Sign-In works)
          files: build/app/outputs/flutter-apk/app-release.apk
