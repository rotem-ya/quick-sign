# Builds the Flutter web app and deploys it to Firebase Hosting.
#
# One-time setup by the product owner:
# 1. console.firebase.google.com → Add project (e.g. "quicksign")
# 2. Project settings → Service accounts → Generate new private key
# 3. GitHub repo → Settings → Secrets and variables → Actions:
#    - Secret  FIREBASE_SERVICE_ACCOUNT: the JSON key content
#    - Variable FIREBASE_PROJECT_ID: the Firebase project id
# 4. Run this workflow (Actions → Deploy web to Firebase Hosting → Run).
#    The site goes live at https://<project-id>.web.app
name: Deploy web to Firebase Hosting

on:
  workflow_dispatch:
  push:
    branches: [main, claude/document-signing-app-k3ae8n]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --no-web-resources-cdn
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
