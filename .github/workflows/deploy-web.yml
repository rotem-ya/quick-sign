# Builds the Flutter web app and deploys it to GitHub Pages.
#
# One-time setup: repository Settings → Pages → Source: "GitHub Actions".
# Note: Pages on a PRIVATE repository requires a paid GitHub plan; making the
# repo public (or using any static host — Netlify / Firebase Hosting / Vercel)
# works on the free plan.
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main, claude/document-signing-app-k3ae8n]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: >
          flutter build web --release --no-web-resources-cdn
          --base-href "/${{ github.event.repository.name }}/"
      - uses: actions/configure-pages@v5
        with:
          # Try to enable Pages automatically on first run.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web
      - id: deployment
        uses: actions/deploy-pages@v4
