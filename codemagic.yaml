workflows:
  ios-testflight:
    name: QuickSign iOS — TestFlight
    triggering:
      events: [tag]
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      # App Store Connect API keys are account/team-level, not per-app, so the
      # existing Apple_Key_Trivia key (same Apple Developer account) uploads
      # QuickSign too — it's the com.rotem.quicksign bundle + app record that
      # target the right app. Must match the integration name in Codemagic
      # exactly (Teams → Integrations → App Store Connect → Manage keys).
      app_store_connect: Apple_Key_Trivia
    environment:
      vars:
        BUNDLE_ID: "com.rotem.quicksign"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up code signing (create cert + profile if missing)
        script: |
          keychain initialize
          # The managed ios_signing block only *fetches* existing profiles, so
          # a brand-new app with none yet fails with "No matching profiles
          # found". Using the App Store Connect API key directly, fetch OR
          # create the distribution certificate + App Store provisioning
          # profile for this bundle id (--create also registers the App ID in
          # the Developer Portal if it doesn't exist yet).
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
