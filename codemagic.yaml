workflows:
  ios-testflight:
    name: QuickSign iOS — TestFlight
    triggering:
      events: [tag]
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      # App Store Connect API keys are account/team-level, not per-app, so the
      # existing Apple_Key_Trivia key (same Apple Developer account) uploads
      # QuickSign too — it's the com.rotem.quicksign bundle + app record that
      # target the right app. Must match the integration name in Codemagic
      # exactly (Teams → Integrations → App Store Connect → Manage keys).
      app_store_connect: Apple_Key_Trivia
    environment:
      # Managed automatic signing: with a distribution certificate stored in
      # Codemagic (Team → Code signing identities → iOS) + the App Store Connect
      # API key integration above, Codemagic fetches the certificate and
      # auto-creates the App Store provisioning profile for this bundle id.
      # (Signing needs a cert *with its private key*; App Store Connect only
      # stores the public half, so the cert must be generated/stored in
      # Codemagic once — it is then reused across builds.)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rotem.quicksign
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
