workflows:
  ios-testflight:
    name: QuickSign iOS — TestFlight
    triggering:
      events: [tag]
      tag_patterns:
        - pattern: "ios-v*"
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      # App Store Connect API keys are account/team-level, not per-app, so the
      # existing Apple_Key_Trivia key (same Apple Developer account) uploads
      # QuickSign too — it's the com.rotem.quicksign bundle + app record that
      # target the right app. Must match the integration name in Codemagic
      # exactly (Teams → Integrations → App Store Connect → Manage keys).
      app_store_connect: Apple_Key_Trivia
    environment:
      # The distribution certificate (whoisthere_dist, same Apple team) already
      # exists and is stored in Codemagic; ios_signing loads it into the build.
      # Only the com.rotem.quicksign App Store *profile* is missing — the
      # explicit fetch-signing-files --create step below mints it via the Admin
      # API key (managed signing fetches profiles but doesn't create them).
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rotem.quicksign
      vars:
        BUNDLE_ID: "com.rotem.quicksign"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Create the missing App Store provisioning profile
        script: |
          # Cert already exists (loaded by ios_signing); create only the profile
          # for this bundle id. --create also registers the App ID if needed.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
